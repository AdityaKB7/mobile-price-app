<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural AI | Mobile Price Estimator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS Variables for Minimalist Dark Theme */
        :root {
            --bg-color: #050505;
            --surface: #121212;
            --surface-hover: #1e1e1e;
            --text-main: #f0f0f0;
            --text-muted: #888888;
            --accent: #6366f1; /* Sleek Indigo */
            --accent-glow: rgba(99, 102, 241, 0.4);
            --border: #2a2a2a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        /* Dynamic Background Grid Animation */
        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background-image: 
                linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 15s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px) translateZ(-200px); }
        }

        /* Header Section */
        header {
            width: 100%;
            padding: 40px 20px 20px;
            text-align: center;
            animation: fadeInDown 1s ease-out;
        }

        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 3rem;
            letter-spacing: -1px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            font-weight: 300;
            font-size: 1.1rem;
        }

        /* Main Form Container */
        .container {
            width: 100%;
            max-width: 1400px;
            padding: 20px 40px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        form {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        /* Input Groups */
        .input-group {
            position: relative;
            background: var(--surface);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s ease;
        }

        .input-group:hover {
            border-color: var(--accent);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transform: translateY(-2px);
            background: var(--surface-hover);
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        /* Icon Styling */
        .input-group label i {
            color: var(--accent);
            font-size: 1.1rem;
            width: 16px;
            text-align: center;
            text-shadow: 0 0 10px var(--accent-glow);
        }

        .input-group input, .input-group select {
            width: 100%;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1.2rem;
            font-family: 'Space Grotesk', sans-serif;
            outline: none;
        }

        /* Custom Dropdown Styling */
        .input-group select {
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            /* Custom minimalist arrow SVG */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236366f1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right center;
            background-size: 18px;
            padding-right: 30px;
        }

        .input-group select option {
            background-color: var(--surface);
            color: var(--text-main);
        }

        /* Button Area */
        .action-area {
            grid-column: 1 / -1;
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        /* Main Glow Button */
        button {
            background: transparent;
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Space Grotesk', sans-serif;
            padding: 15px 40px;
            border: 1px solid var(--accent);
            border-radius: 30px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px var(--accent-glow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: all 0.4s ease;
        }

        button:hover {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 0 30px var(--accent-glow);
            transform: scale(1.05);
        }

        button:hover::before {
            left: 100%;
            transition: 0.5s;
        }

        /* Secondary Clear Button */
        .btn-secondary {
            border: 1px solid var(--border);
            box-shadow: none;
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            background: transparent;
            border-color: #ff4444;
            color: #ff4444;
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.2);
        }

        /* Result Display Area */
        #result-container {
            display: none;
            text-align: center;
            margin-top: 30px;
            padding: 30px;
            border-radius: 16px;
            background: rgba(99, 102, 241, 0.05);
            border: 1px solid var(--accent);
            animation: scaleIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        #result-text {
            font-size: 2.5rem;
            font-family: 'Space Grotesk', sans-serif;
            color: var(--accent);
            text-shadow: 0 0 20px var(--accent-glow);
            margin-top: 10px;
        }

        /* Animations */
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }

        .loader {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <header>
        <h1>Neural AI Matrix</h1>
        <p class="subtitle">Deep Learning Mobile Hardware Evaluation</p>
    </header>

    <div class="container">
        <form id="prediction-form">
            
            <div class="input-group">
                <label><i class="fa-solid fa-battery-full"></i> Battery (mAh)</label>
                <input type="number" id="battery_power" required value="1800">
            </div>
            <div class="input-group">
                <label><i class="fa-brands fa-bluetooth-b"></i> Bluetooth</label>
                <select id="blue">
                    <option value="1" selected>Yes (1)</option>
                    <option value="0">No (0)</option>
                </select>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-microchip"></i> Clock (GHz)</label>
                <input type="number" step="0.1" id="clock_speed" required value="2.5">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-sim-card"></i> Dual SIM</label>
                <select id="dual_sim">
                    <option value="1" selected>Yes (1)</option>
                    <option value="0">No (0)</option>
                </select>
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-camera-rotate"></i> Front Cam (MP)</label>
                <input type="number" id="fc" required value="12">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-signal"></i> 4G Network</label>
                <select id="four_g">
                    <option value="1" selected>Yes (1)</option>
                    <option value="0">No (0)</option>
                </select>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-memory"></i> Storage (GB)</label>
                <input type="number" id="int_memory" required value="64">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-ruler-vertical"></i> Depth (cm)</label>
                <input type="number" step="0.1" id="m_dep" required value="0.5">
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-weight-hanging"></i> Weight (g)</label>
                <input type="number" id="mobile_wt" required value="150">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-server"></i> CPU Cores</label>
                <input type="number" id="n_cores" required value="8">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-camera"></i> Main Cam (MP)</label>
                <input type="number" id="pc" required value="20">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-arrows-up-down"></i> Px Height</label>
                <input type="number" id="px_height" required value="1920">
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-arrows-left-right"></i> Px Width</label>
                <input type="number" id="px_width" required value="1080">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-gauge-high"></i> RAM (MB)</label>
                <input type="number" id="ram" required value="3000">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-mobile-screen"></i> Screen H (cm)</label>
                <input type="number" id="sc_h" required value="15">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-mobile-screen"></i> Screen W (cm)</label>
                <input type="number" id="sc_w" required value="7">
            </div>

            <div class="input-group">
                <label><i class="fa-solid fa-phone"></i> Talk Time (Hr)</label>
                <input type="number" id="talk_time" required value="16">
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-tower-cell"></i> 3G Network</label>
                <select id="three_g">
                    <option value="1" selected>Yes (1)</option>
                    <option value="0">No (0)</option>
                </select>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-hand-pointer"></i> Touch Screen</label>
                <select id="touch_screen">
                    <option value="1" selected>Yes (1)</option>
                    <option value="0">No (0)</option>
                </select>
            </div>
            <div class="input-group">
                <label><i class="fa-solid fa-wifi"></i> WiFi</label>
                <select id="wifi">
                    <option value="1" selected>Yes (1)</option>
                    <option value="0">No (0)</option>
                </select>
            </div>

            <div class="action-area">
                <button type="button" id="clear-btn" class="btn-secondary">
                    <i class="fa-solid fa-trash-can"></i> CLEAR DATA
                </button>
                <button type="submit" id="submit-btn">
                    <i class="fa-solid fa-bolt" id="btn-icon"></i>
                    <span id="btn-text">INITIALIZE NETWORK</span>
                    <div class="loader" id="btn-loader"></div>
                </button>
            </div>

        </form>

        <div id="result-container">
            <p style="color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; font-size: 0.9rem;">Estimated Tier</p>
            <div id="result-text">-</div>
        </div>

    </div>

    <script>
        // Clear Data Logic
        document.getElementById('clear-btn').addEventListener('click', () => {
            document.querySelectorAll('input[type="number"]').forEach(input => input.value = '');
            // Optional: reset dropdowns to default 0
            // document.querySelectorAll('select').forEach(select => select.value = '0'); 
            document.getElementById('result-container').style.display = 'none';
        });

        // Form Submit Logic
        document.getElementById('prediction-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const loader = document.getElementById('btn-loader');
            const resultContainer = document.getElementById('result-container');
            
            btnText.style.display = 'none';
            btnIcon.style.display = 'none';
            loader.style.display = 'block';
            resultContainer.style.display = 'none';

            const features = [
                parseFloat(document.getElementById('battery_power').value),
                parseInt(document.getElementById('blue').value),
                parseFloat(document.getElementById('clock_speed').value),
                parseInt(document.getElementById('dual_sim').value),
                parseFloat(document.getElementById('fc').value),
                parseInt(document.getElementById('four_g').value),
                parseFloat(document.getElementById('int_memory').value),
                parseFloat(document.getElementById('m_dep').value),
                parseFloat(document.getElementById('mobile_wt').value),
                parseInt(document.getElementById('n_cores').value),
                parseFloat(document.getElementById('pc').value),
                parseFloat(document.getElementById('px_height').value),
                parseFloat(document.getElementById('px_width').value),
                parseFloat(document.getElementById('ram').value),
                parseFloat(document.getElementById('sc_h').value),
                parseFloat(document.getElementById('sc_w').value),
                parseFloat(document.getElementById('talk_time').value),
                parseInt(document.getElementById('three_g').value),
                parseInt(document.getElementById('touch_screen').value),
                parseInt(document.getElementById('wifi').value)
            ];

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ features: features })
                });

                const data = await response.json();
                
                const priceMap = {
                    0: "Low Cost / Budget",
                    1: "Medium Cost",
                    2: "High Cost / Premium",
                    3: "Ultra High / Flagship"
                };

                if (data.error) {
                    document.getElementById('result-text').innerText = "Error Processing Data";
                    document.getElementById('result-text').style.color = "#ff4444";
                } else {
                    document.getElementById('result-text').innerText = priceMap[data.predicted_price_range];
                    document.getElementById('result-text').style.color = "var(--accent)";
                }

                resultContainer.style.display = 'block';

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('result-text').innerText = "Connection Failed";
                resultContainer.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                btnText.style.display = 'block';
                btnIcon.style.display = 'inline-block';
            }
        });
    </script>
</body>
</html>
